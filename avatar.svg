<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 190">
  <!-- Cow Body/Base -->
  <circle cx="95" cy="95" r="85" fill="#ffffff" stroke="#000000" stroke-width="4"/>
  
  <!-- Left Ear -->
  <ellipse cx="65" cy="70" rx="12" ry="20" fill="#000000" transform="rotate(-30 65 70)"/>
  
  <!-- Right Ear -->
  <ellipse cx="125" cy="70" rx="12" ry="20" fill="#000000" transform="rotate(30 125 70)"/>
  
  <!-- Left Eye -->
  <circle cx="70" cy="90" r="8" fill="#ffffff"/>
  <circle cx="70" cy="90" r="4" fill="#000000"/>
  
  <!-- Right Eye -->
  <circle cx="120" cy="90" r="8" fill="#ffffff"/>
  <circle cx="120" cy="90" r="4" fill="#000000"/>
  
  <!-- Nose/Muzzle Area -->
  <ellipse cx="95" cy="105" rx="15" ry="12" fill="#ffffff" stroke="#000000" stroke-width="3"/>
  <ellipse cx="88" cy="102" r="3" fill="#ff6b6b"/>
  <ellipse cx="102" cy="102" r="3" fill="#ff6b6b"/>
  
  <!-- Cow Spots -->
  <circle cx="50" cy="80" r="12" fill="#000000"/>
  <circle cx="140" cy="75" r="10" fill="#000000"/>
  <circle cx="60" cy="130" r="8" fill="#000000"/>
  <circle cx="130" cy="125" r="9" fill="#000000"/>
  <circle cx="95" cy="50" r="7" fill="#000000"/>
  
  <!-- Moos Text -->
  <text x="95" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#000000">🐮</text>
</svg>
